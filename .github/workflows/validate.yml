name: validate

on:
  pull_request:
  push:

jobs:
  validate:
    name: Validate plugin-architect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run plugin validator
        run: node plugins/core/scripts/validate-plugins.mjs .

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#plans" "#caveman" "#src"
